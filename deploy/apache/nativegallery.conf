# NativeGallery — Apache 2.4 VirtualHost (PHP-FPM)
#
# Debian/Ubuntu:
#   sudo cp deploy/apache/nativegallery.conf /etc/apache2/sites-available/nativegallery.conf
#   sudo a2ensite nativegallery.conf
#   sudo a2enmod rewrite proxy proxy_fcgi setenvif
#   sudo apachectl configtest && sudo systemctl reload apache2
#
# Rocky/AlmaLinux/CentOS Stream:
#   sudo cp deploy/apache/nativegallery.conf /etc/httpd/conf.d/nativegallery.conf
#   sudo apachectl configtest && sudo systemctl reload httpd
#
# Replace example.com, /var/www/nativegallery and PHP-FPM socket before use.

<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com

    DocumentRoot /var/www/nativegallery

    <Directory /var/www/nativegallery>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block config and internals (in addition to .htaccess)
    <Files "ngallery.yaml">
        Require all denied
    </Files>

    <Directory /var/www/nativegallery/vendor>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/app>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/config>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/views>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/sqlcore>
        Require all denied
    </Directory>

    # PHP 8.3 via FPM
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Upload limit (128M)
    LimitRequestBody 134217728

    ErrorLog ${APACHE_LOG_DIR}/nativegallery.error.log
    CustomLog ${APACHE_LOG_DIR}/nativegallery.access.log combined
</VirtualHost>