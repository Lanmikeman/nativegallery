# NativeGallery — Nginx site config for Ubuntu 24.04 + PHP-FPM + MySQL
#
# Install:
#   sudo cp deploy/nginx/nativegallery.conf /etc/nginx/sites-available/nativegallery
#   sudo ln -sf /etc/nginx/sites-available/nativegallery /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace example.com and /var/www/nativegallery before use.

server {
    listen 80;
    listen [::]:80;

    server_name example.com www.example.com;

    root /var/www/nativegallery;
    index index.php;

    charset utf-8;
    client_max_body_size 128M;

    # Security: block hidden/config files (equivalent to .htaccess rules)
    location ~ /\.(git|env|yml|yaml) {
        deny all;
        return 404;
    }

    location ~ /\.gitignore {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location = /ngallery.yaml {
        deny all;
        return 404;
    }

    # Deny directory listing
    autoindex off;

    # Static assets — long cache
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP front controller
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        # Legacy URLs and directory stubs (lk/, help/, pk.php, ticket.php) → front controller
        try_files $uri /index.php$is_args$args;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Writable upload directories — served directly
    location ^~ /uploads/ {
        try_files $uri =404;
    }

    location ^~ /cdn/ {
        try_files $uri =404;
    }

    location ^~ /static/ {
        try_files $uri =404;
    }

    # Block access to vendor and app internals
    location ^~ /vendor/ {
        deny all;
        return 404;
    }

    location ^~ /sqlcore/ {
        deny all;
        return 404;
    }

    location ^~ /app/ {
        deny all;
        return 404;
    }

    location ^~ /config/ {
        deny all;
        return 404;
    }

    location ^~ /views/ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/nativegallery.access.log;
    error_log  /var/log/nginx/nativegallery.error.log;
}