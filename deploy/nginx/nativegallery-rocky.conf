# NativeGallery — Nginx site config for Rocky/AlmaLinux/CentOS Stream 9
# PHP-FPM socket: /run/php-fpm/www.sock
#
#   sudo cp deploy/nginx/nativegallery-rocky.conf /etc/nginx/conf.d/nativegallery.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    server_name example.com www.example.com;

    root /var/www/nativegallery;
    index index.php;

    charset utf-8;
    client_max_body_size 128M;

    location ~ /\.(git|env|yml|yaml) {
        deny all;
        return 404;
    }

    location ~ /\.gitignore {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location = /ngallery.yaml {
        deny all;
        return 404;
    }

    autoindex off;

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri /index.php$is_args$args;
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ^~ /uploads/ {
        try_files $uri =404;
    }

    location ^~ /cdn/ {
        try_files $uri =404;
    }

    location ^~ /static/ {
        try_files $uri =404;
    }

    location ^~ /vendor/ {
        deny all;
        return 404;
    }

    location ^~ /sqlcore/ {
        deny all;
        return 404;
    }

    location ^~ /app/ {
        deny all;
        return 404;
    }

    location ^~ /config/ {
        deny all;
        return 404;
    }

    location ^~ /views/ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/nativegallery.access.log;
    error_log  /var/log/nginx/nativegallery.error.log;
}