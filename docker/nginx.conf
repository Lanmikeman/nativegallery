server {
    listen 8080;
    listen [::]:8080;

    server_name _;

    root /var/www/html;
    index index.php;

    charset utf-8;
    client_max_body_size 128M;

    location ~ /\.(git|env|yml|yaml) {
        deny all;
        return 404;
    }

    location ~ /\.gitignore {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location = /ngallery.yaml {
        deny all;
        return 404;
    }

    autoindex off;

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri /index.php$is_args$args;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ^~ /uploads/ {
        try_files $uri =404;
    }

    location ^~ /cdn/ {
        try_files $uri =404;
    }

    location ^~ /static/ {
        try_files $uri =404;
    }

    location ^~ /vendor/ {
        deny all;
        return 404;
    }

    location ^~ /sqlcore/ {
        deny all;
        return 404;
    }

    location ^~ /app/ {
        deny all;
        return 404;
    }

    location ^~ /config/ {
        deny all;
        return 404;
    }

    location ^~ /views/ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}