# NativeGallery — OpenLiteSpeed virtual host (фрагмент)
# Admin → Virtual Hosts → Add → Config → включите этот шаблон
#
# root по умолчанию: /var/www/nativegallery
# production:        /mnt/win/nativegallery

docRoot                   /var/www/nativegallery
indexFiles                index.php

rewrite  {
  enable                  1
  autoLoadHtaccess        1
}

context /uploads/ {
  location                /var/www/nativegallery/uploads/
  allowBrowse             1
}

context /static/ {
  location                /var/www/nativegallery/static/
  allowBrowse             1
}

context /vendor/ {
  location                /var/www/nativegallery/vendor/
  allowBrowse             0
}

context /app/ {
  allowBrowse             0
}

context /sqlcore/ {
  allowBrowse             0
}

phpIniOverride  {
  php_admin_value upload_max_filesize 128M
  php_admin_value post_max_size 128M
  php_admin_value memory_limit 512M
  php_admin_value max_execution_time 300
}

# External app: lsphp83 (путь зависит от установки OLS)
# scripthandler  { add lsapi:lsphp83 php }