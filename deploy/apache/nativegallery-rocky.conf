# NativeGallery — Apache 2.4 on Rocky/AlmaLinux/CentOS Stream (PHP-FPM)
# PHP-FPM socket: /run/php-fpm/www.sock (default on RHEL family)
#
#   sudo cp deploy/apache/nativegallery-rocky.conf /etc/httpd/conf.d/nativegallery.conf
#   sudo apachectl configtest && sudo systemctl reload httpd

<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com

    DocumentRoot /var/www/nativegallery

    <Directory /var/www/nativegallery>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Files "ngallery.yaml">
        Require all denied
    </Files>

    <Directory /var/www/nativegallery/vendor>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/app>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/config>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/views>
        Require all denied
    </Directory>

    <Directory /var/www/nativegallery/sqlcore>
        Require all denied
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

    LimitRequestBody 134217728

    ErrorLog /var/log/httpd/nativegallery.error.log
    CustomLog /var/log/httpd/nativegallery.access.log combined
</VirtualHost>