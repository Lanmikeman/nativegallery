ngallery:
  root:
    title: "NativeGallery"
    adminemail: "example@example.com"
    showtitle: false
    logo: "/static/img/logosmall.png"
    description: ""
    keywords: ""
    maintenance: false
    debug: true
    alloweddomains: ["example.com"]
    botkey: ''
    logslocation: '/logs'
    encryptionkey: ''
    footerslogan: 'Aloha, Hawaii!'
    timezone: 'Europe/Moscow'
    access:
      type: 'allow'
      countries: ''
    cloudflare-caching: false
    email:
      credentials:
        host: 'example@mail.com'
        username: ''
        password: ''
        port: 465
      from:
        address:
    db:
      name: ''
      host: ''
      login: ''
      password: ''
    websockets:
      messages: ""
    storage:

      # type: 's3' - загрузка файлов в хранилище S3 (Amazon S3, Cloudflare, MinIO и т.д)
      # type: 'server' - загрузка файлов в папку uploads (hardcode)

      type: 'server'
      s3:
        domains:
          public: ''
          gateway: ''
        credentials:
          key: ''
          secret: ''
          region: 'auto'
          version: 'latest'
          bucket: ''
    img:
      proxy: true
      percent: 50
    registration:
      emailverify: false
      prohibited_usernames: ''
      access:
        public: true
    video:
      upload:
        allow: true
    audio:
      upload:
        allow: true
        maxsize: 52428800
      streams:
        allow: true
    photo:
      uploadindex:
        enabled: false
        default: 5
        acceptvalue: 1
        declinevalue: 2
      upload:
        allow: true
        premoderation: true
        defaultindex: 5.0
        allowgif: true
    comments:
      premoderation: false
    openvk:
      enabled: true
      client_name: 'CTTC Gallery'
      redirect_uri: ''
      response_type: 'php'
      auto_register: true
      providers:
        openvk_org:
          enabled: true
          label: 'OpenVK.org'
          domain: 'https://openvk.org'
          api_domain: 'https://api.openvk.org'
          accent: '#5181b8'
          icon: 'https://openvk.org/assets/packages/static/openvk/img/favicon.ico'
        # второй инстанс OVK — подключён на production-сервере форка как пример
        vepurovk:
          enabled: true
          label: 'VepurOVK'
          domain: 'https://vepurovk.xyz'
          accent: '#45668e'
          icon: 'https://vepurovk.xyz/assets/packages/static/openvk/img/favicon.ico'
    contests:
      enabled: true
      autonew:
        enabled: true
        times:
          pretendsopen: 'now'
          pretendsclose: '2d'
          open: 'now'
          close: '2d'
